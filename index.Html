<!doctype html>
<html lang="de" class="bg-gray-100 text-gray-900">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR-Invoice MVP</title>

    <!-- Optional: Tailwind per CDN (für schnelle Styles, später gern entfernen oder lokal bauen) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Dein eigenes CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="min-h-dvh antialiased">
    <main class="max-w-3xl mx-auto p-4">
      <header class="flex items-center justify-between mb-6">
        <h1 class="text-xl font-semibold">QR‑Invoice Demo</h1>
        <button id="toggleTheme" class="px-3 py-1.5 rounded-md border text-sm">
          🌗 Theme
        </button>
      </header>

      <section id="app" class="bg-white border rounded-lg p-4 shadow-sm">
        <!-- app.js rendert hier hinein -->
        <noscript>Bitte JavaScript aktivieren.</noscript>
      </section>

      <footer class="text-xs text-gray-500 mt-8">
        <p>Demo: Öffentliche Rechnung, Shortlink & Dashboard folgen als eigene Seiten.</p>
      </footer>
    </main>

    <!-- Deine App-Logik -->
    <script src="./app.js"></script>
    <script>
      // Kleiner Theme-Toggle (Light/Dark)
      const html = document.documentElement;
      document.getElementById('toggleTheme')?.addEventListener('click', () => {
        html.classList.toggle('dark');
        if (html.classList.contains('dark')) {
          html.classList.add('bg-slate-900', 'text-slate-100');
          html.classList.remove('bg-gray-100', 'text-gray-900');
        } else {
          html.classList.add('bg-gray-100', 'text-gray-900');
          html.classList.remove('bg-slate-900', 'text-slate-100');
        }
      });

      // Falls deine app.js eine init-Funktion exportiert (oder global definiert), ruf sie auf:
      if (typeof window.initApp === 'function') {
        window.initApp({ mountId: 'app' });
      } else {
        // Fallback: Zeige etwas an, falls initApp noch nicht existiert
        document.getElementById('app').innerHTML = `
          <div class="space-y-3">
            <p class="text-sm text-gray-600 dark:text-slate-300">
              Willkommen! Deine <code>index.html</code> lädt <code>style.css</code> und <code>app.js</code>.
            </p>
            <p class="text-sm">Erstelle als nächstes öffentliche und Dashboard‑Seiten wie <code>public-view/view.html</code> & <code>dashboard/index.html</code>.</p>
          </div>
        `;
      }
    </script>
  </body>
</html>
